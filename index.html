<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UPSS, TE HEMOS HACKEADO</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: #000;
      font-family: 'Courier New', Courier, monospace;
      color: #ff0000;
      overflow-y: scroll;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: #ff0000 #1a0000;
    }

    body::-webkit-scrollbar {
      width: 12px;
    }

    body::-webkit-scrollbar-track {
      background: #1a0000;
    }

    body::-webkit-scrollbar-thumb {
      background: #ff0000;
      border-radius: 6px;
      box-shadow: 0 0 10px #ff0000;
    }

    body::-webkit-scrollbar-thumb:hover {
      background: #ff3333;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: clamp(4rem, 14vw, 8rem);
      font-weight: 900;
      letter-spacing: 10px;
      text-transform: uppercase;
      color: #ff0000;
      text-shadow:
        0 0 12px #ff0000,
        0 0 25px #ff0000,
        0 0 50px #ff0000;
      animation: flicker 3.5s infinite alternate;
      margin-bottom: 1.5rem;
    }

    .by {
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      color: #ff004d;
      text-shadow: 0 0 10px #ff004d;
      margin: 1rem 0;
      letter-spacing: 5px;
    }

    .gstxx, .azazel {
      display: inline-block;
      animation: pulse 2.5s infinite;
    }

    .gstxx { color: #ff004d; text-shadow: 0 0 15px #ff004d; }
    .azazel { color: #ff3333; text-shadow: 0 0 15px #ff3333; }

    .message {
      font-size: clamp(1.4rem, 4vw, 2.8rem);
      color: #ff0000;
      text-shadow: 0 0 8px #ff0000;
      letter-spacing: 3px;
      margin: 2rem 0 3rem;
      animation: glitch 6s infinite;
      font-weight: bold;
      max-width: 90%;
      line-height: 1.4;
    }

    .telegram {
      margin-top: 3rem;
      font-size: 1.6rem;
      color: #ff004d;
      text-shadow: 0 0 8px #ff004d;
      letter-spacing: 2px;
    }

    .telegram a {
      color: #ff3333;
      text-decoration: none;
      transition: all 0.3s;
    }

    .telegram a:hover {
      color: #ff6666;
      text-shadow: 0 0 15px #ff6666;
    }

    .scanline {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(255, 0, 0, 0.04) 50%,
        transparent 100%
      );
      pointer-events: none;
      animation: scan 9s linear infinite;
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 12px #ff0000, 0 0 25px #ff0000, 0 0 50px #ff0000; }
      20%, 24%, 55% { text-shadow: none; opacity: 0.85; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.04); }
    }

    @keyframes scan {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-3px, 3px); }
      40% { transform: translate(3px, -3px); }
      60% { transform: translate(-2px, 2px); }
      80% { transform: translate(2px, -2px); }
      100% { transform: translate(0); }
    }

    .footer {
      position: fixed;
      bottom: 15px;
      width: 100%;
      text-align: center;
      color: #222;
      font-size: 0.9rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="scanline"></div>

  <div class="container">
    <h1>HACKED</h1>
    <div class="by">
      BY <span class="gstxx">GSTXX</span>
      <span style="color:#ff0000; margin:0 12px;">&</span>
      <span class="azazel">AZAZEL</span>
    </div>
    <div class="message">
      SU SISTEMA AHORA NOS PERTENECE, ESTO NO ES PARA EXPONER NADA. SOLO ES PARA DEJAR UN MENSAJE QUE YA TENEMOS EN LA MIRA ESTE PAÍS, PONGANSE ATENTOS QUE YA LLEGUÉ.
    </div>
    <div class="telegram">
      <a href="https://t.me/cortexch" target="_blank">https://t.me/cortexch</a>
    </div>
  </div>

  <div class="footer">
    Your arrogance was your downfall • 2026
  </div>
</body>
</html>
